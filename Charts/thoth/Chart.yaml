apiVersion: v2
name: thoth
description: >-
  thoth — a personal Obsidian/PKM agent: a Slack daemon, an HTTP MCP server, a
  networked Hindsight semantic index, and scheduled reindex/summary CronJobs.

# A chart can be either an 'application' or a 'library' chart.
type: application

# Placeholder version/appVersion. CI stamps the real values from the git tag at
# package time (`helm package -u --version $TAG --app-version $TAG`); these 0.0.0
# defaults exist only so `helm lint`/`helm template` work locally off a checkout.
version: 0.0.0

# The version of thoth being deployed. CI overrides this with the release tag.
appVersion: "0.0.0"
