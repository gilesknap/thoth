apiVersion: v1
kind: Service
metadata:
  name: {{ include "thoth.mcpServiceName" . }}
  labels:
    app.kubernetes.io/component: mcp
    {{- include "thoth.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: mcp
    {{- include "thoth.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
      protocol: TCP
