apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "thoth.configmapName" . }}
  labels:
    {{- include "thoth.labels" . | nindent 4 }}
data:
  PKM_VAULT: {{ .Values.config.pkmVault | quote }}
  THOTH_HOME: {{ .Values.config.thothHome | quote }}
  OBSIDIAN_VAULT_NAME: {{ .Values.config.obsidianVaultName | quote }}
  THOTH_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ANTHROPIC_MODEL: {{ .Values.config.anthropicModel | quote }}
  {{- with .Values.config.analyseModel }}
  THOTH_ANALYSE_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.diagramModel }}
  THOTH_DIAGRAM_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.intentModel }}
  THOTH_INTENT_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.dailyLlmBudget }}
  THOTH_DAILY_LLM_BUDGET: {{ . | quote }}
  {{- end }}
  # Hindsight is a networked Service (see #157); thoth reaches it over HTTP at the
  # in-cluster Service DNS name on the Hindsight port.
  THOTH_HINDSIGHT_BASE_URL: {{ printf "http://%s:%v" (include "thoth.hindsightServiceName" .) .Values.hindsight.port | quote }}
  THOTH_GIT_REMOTE: {{ .Values.config.gitRemote | quote }}
  THOTH_GIT_BRANCH: {{ .Values.config.gitBranch | quote }}
  # The MCP streamable-HTTP transport rejects requests whose Host/Origin are not
  # allow-listed (a 421 behind ingress); both keys are required for ingress to work.
  THOTH_MCP_ALLOWED_HOSTS: {{ .Values.config.mcpAllowedHosts | quote }}
  THOTH_MCP_ALLOWED_ORIGINS: {{ .Values.config.mcpAllowedOrigins | quote }}
  # MCP OAuth 2.1 (#bearer + per-user GitHub identity). The matching client secret
  # and JWT signing secret are NOT templated here; they live in the Secret named by
  # secretName (GITHUB_OAUTH_CLIENT_SECRET, THOTH_JWT_SIGNING_SECRET). OAuth is off
  # unless the client id and server URL are both set.
  {{- with .Values.config.githubOauthClientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthServerUrl }}
  THOTH_OAUTH_SERVER_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.allowedGithubUsers }}
  THOTH_ALLOWED_GITHUB_USERS: {{ . | quote }}
  {{- end }}
