apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-slack" (include "thoth.fullname" .) }}
  labels:
    app.kubernetes.io/component: slack
    {{- include "thoth.labels" . | nindent 4 }}
spec:
  # Single writer to the vault; Socket Mode means no inbound Service.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: slack
      {{- include "thoth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: slack
        {{- include "thoth.labels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "thoth.initContainers" . | nindent 8 }}
      containers:
        - name: slack
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["slack"]
          envFrom:
            {{- include "thoth.envFrom" . | nindent 12 }}
          volumeMounts:
            {{- include "thoth.volumeMounts" . | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- include "thoth.volumes" . | nindent 8 }}
