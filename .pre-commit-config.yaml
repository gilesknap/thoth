repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # uv.lock is generated; the bundled Obsidian community plugins (Excalidraw's
        # main.js is ~8 MB) are vendored verbatim into the vault template and tracked
        # in the vault repo too, so they are intentionally over the default cap.
        exclude: ^(uv\.lock|src/thoth/templates/\.obsidian/plugins/)
      - id: check-yaml
        # Helm templates are Go-templated YAML; check-yaml can't parse them.
        exclude: ^Charts/
      - id: check-merge-conflict
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: ruff
        name: lint with ruff
        language: system
        entry: ruff check --force-exclude --fix
        types: [python]
        require_serial: true

      - id: ruff-format
        name: format with ruff
        language: system
        entry: ruff format --force-exclude
        types: [python]
        require_serial: true

      - id: uv-sync
        name: update uv.lock and venv
        pass_filenames: false
        language: system
        entry: uv sync
        files: ^(uv\.lock|pyproject\.toml)$

  # Charts/thoth/values.schema.json is committed and kept current by hand. The
  # losisin/helm-values-schema-json pre-commit hook is intentionally NOT wired in:
  # it shells out to the `helm schema` plugin, which isn't present in the generic
  # CI tox runner. To regenerate the schema locally after editing values.yaml,
  # install the plugin (`helm plugin install https://github.com/losisin/helm-values-schema-json`)
  # and run: `helm schema --config Charts/thoth/.schema.config.yaml`.

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
