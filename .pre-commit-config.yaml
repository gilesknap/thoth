repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # uv.lock is generated; the bundled Obsidian community plugins (Excalidraw's
        # main.js is ~8 MB) are vendored verbatim into the vault template and tracked
        # in the vault repo too, so they are intentionally over the default cap.
        exclude: ^(uv\.lock|src/thoth/templates/\.obsidian/plugins/)
      - id: check-yaml
        # Helm templates are Go-templated YAML; check-yaml can't parse them.
        exclude: ^Charts/
      - id: check-merge-conflict
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: ruff
        name: lint with ruff
        language: system
        entry: ruff check --force-exclude --fix
        types: [python]
        require_serial: true

      - id: ruff-format
        name: format with ruff
        language: system
        entry: ruff format --force-exclude
        types: [python]
        require_serial: true

      - id: uv-sync
        name: update uv.lock and venv
        pass_filenames: false
        language: system
        entry: uv sync
        files: ^(uv\.lock|pyproject\.toml)$

  # Regenerates Charts/thoth/values.schema.json from values.yaml. Needs the helm
  # `schema` plugin on PATH (in the devcontainer via the Dockerfile, and in CI via
  # the _precommit.yml workflow which installs helm + this plugin before running).
  - repo: https://github.com/losisin/helm-values-schema-json
    rev: v2.3.1
    hooks:
      - id: helm-schema
        args:
          - --config
          - Charts/thoth/.schema.config.yaml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
