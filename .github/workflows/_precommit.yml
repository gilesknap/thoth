on:
  workflow_call:

env:
  HELM_VERSION_TO_INSTALL: 3.17.1

jobs:
  run:
    runs-on: "ubuntu-latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install helm
        uses: Azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION_TO_INSTALL }}

      # The helm-schema pre-commit hook regenerates Charts/thoth/values.schema.json
      # via this plugin, so it must be on PATH before pre-commit runs.
      - name: Install helm plugins
        run: helm plugin install https://github.com/losisin/helm-values-schema-json

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run pre-commit
        run: uv run --locked tox -e pre-commit
