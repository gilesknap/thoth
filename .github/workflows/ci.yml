name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:

jobs:

  lint:
    # pre-commit runs the helm-schema hook, so it needs helm + the plugin —
    # _precommit.yml installs them (the generic _tox runner does not have helm).
    uses: ./.github/workflows/_precommit.yml

  type-checking:
    uses: ./.github/workflows/_tox.yml
    with:
      tox: type-checking

  test:
    strategy:
      matrix:
        runs-on: ["ubuntu-latest"] # can add windows-latest, macos-latest
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    uses: ./.github/workflows/_test.yml
    with:
      runs-on: ${{ matrix.runs-on }}
      python-version: ${{ matrix.python-version }}

  container:
    needs: test
    if: always()
    uses: ./.github/workflows/_container.yml
    with:
      publish: ${{ needs.test.result == 'success' }}
    permissions:
      contents: read
      packages: write

  helm:
    needs: test
    if: always()
    uses: ./.github/workflows/_helm.yml
    with:
      publish: ${{ needs.test.result == 'success' }}
    permissions:
      contents: read
      packages: write

  docs:
    uses: ./.github/workflows/_docs.yml
    permissions:
      contents: write

  dist:
    uses: ./.github/workflows/_dist.yml
  
  release:
    needs: [dist, test, docs]
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/_release.yml
    permissions:
      contents: write
